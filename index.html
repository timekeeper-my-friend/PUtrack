<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Push-Up Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f3f4f6;
        }
        .tracker {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        input {
            padding: 10px;
            font-size: 16px;
            width: 100px;
            text-align: center;
            margin-right: 8px;
        }
        button {
            padding: 10px 16px;
            font-size: 16px;
            margin: 4px;
            cursor: pointer;
        }
        #timer {
            font-size: 54px;
            font-weight: bold;
            margin: 20px 0;
            font-family: monospace;
        }
    </style>
</head>
<body>

<div class="tracker">
    <input type="number" id="pushups" placeholder="Push-ups" min="1">
    <button id="setBtn">Set Time</button>
    
    <div id="timer">00:00:00</div>
    
    <div>
        <button id="startBtn" disabled>Start</button>
        <button id="pauseBtn" disabled>Pause</button>
        <button id="stopBtn" disabled>Stop</button>
    </div>
</div>

<script>
    let interval;
    let secondsLeft = 0;
    let savedSeconds = 0;

    const pushupsInput = document.getElementById('pushups');
    const setBtn = document.getElementById('setBtn');
    const timerDisplay = document.getElementById('timer');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const stopBtn = document.getElementById('stopBtn');

    setBtn.addEventListener('click', () => {
        const num = parseInt(pushupsInput.value);
        if (!num || num <= 0) return;
        
        secondsLeft = num * 5 * 60; 
        savedSeconds = secondsLeft;
        
        updateClock();
        clearInterval(interval);
        
        startBtn.disabled = false;
        pauseBtn.disabled = true;
        stopBtn.disabled = false;
    });

    startBtn.addEventListener('click', () => {
        startBtn.disabled = true;
        pauseBtn.disabled = false;
        
        interval = setInterval(() => {
            if (secondsLeft <= 0) {
                clearInterval(interval);
                timerDisplay.textContent = "00:00:00";
                pauseBtn.disabled = true;
                return;
            }
            secondsLeft--;
            updateClock();
        }, 1000);
    });

    pauseBtn.addEventListener('click', () => {
        clearInterval(interval);
        startBtn.disabled = false;
        pauseBtn.disabled = true;
    });

    stopBtn.addEventListener('click', () => {
        clearInterval(interval);
        secondsLeft = savedSeconds;
        updateClock();
        startBtn.disabled = false;
        pauseBtn.disabled = true;
    });

    function updateClock() {
        const hrs = Math.floor(secondsLeft / 3600);
        const mins = Math.floor((secondsLeft % 3600) / 60);
        const secs = secondsLeft % 60;
        
        timerDisplay.textContent = 
            `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }
</script>

</body>
</html>
