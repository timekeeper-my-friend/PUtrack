<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Tracker</title>
<style>
    body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #f3f4f6; padding: 20px; } 
    .tracker { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; max-width: 450px; width: 100%; } 
    .section { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 2px solid #f1f5f9; }
    .section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    h3 { margin-top: 0; color: #1e293b; font-size: 18px; }
    select, button { padding: 10px 16px; font-size: 16px; margin: 4px; border-radius: 6px; } 
    select { border: 1px solid #cbd5e1; background: white; text-align: center; min-width: 150px; }
    button { background-color: #2563eb; color: white; border: none; font-weight: bold; cursor: pointer; }
    button:disabled { background-color: #cbd5e1; cursor: not-allowed; }
    #balance-display { font-size: 22px; font-weight: bold; color: #16a34a; margin-bottom: 10px; }
    #timer { font-size: 54px; font-weight: bold; margin: 15px 0; font-family: monospace; } 
    .shop-list { display: flex; flex-direction: column; gap: 8px; text-align: left; margin-top: 10px; }
    .shop-item { display: flex; justify-content: space-between; align-items: center; background: #f8fafc; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 6px; }
    .buy-btn { background-color: #16a34a; font-size: 14px; padding: 6px 12px; margin: 0; }
</style></head><body>
<audio id="alarmAudio" src="https://wikimedia.org" preload="auto"></audio>
<div class="tracker"> 
    <div class="section"><h3>Select Profile</h3><select id="userDropdown"></select></div>
    <div class="section"><div id="balance-display"><span id="displayName">Loading</span>'s Balance: <span id="pointsBalance">0</span> Points</div></div>
    <div class="section"><h3>1. Track Exercises</h3><select id="exerciseSelect"></select><button id="claimBtn">Claim Points</button></div>
    <div class="section"><h3>2. Time Reward Shop</h3><div class="shop-list" id="shopContainer"></div></div>
    <div class="section"><h3>3. Active Time Remaining</h3><div id="timer">00:00:00</div> 
        <div><button id="startBtn" disabled>Start Time</button><button id="pauseBtn" disabled>Pause</button><button id="stopBtn" disabled>Stop</button></div> 
    </div>
</div>
<script> 
    // =========================================================================
    // ⚙️ SYSTEM SETTINGS CONFIGURATION
    // Change these values to edit names!
    // =========================================================================
    const REAL_NAME_1 = "Tate"; 
    const REAL_NAME_2 = "Cooper";

    const userList = [REAL_NAME_1, REAL_NAME_2], userBalances = {}; 
    let countdownInterval = null, secondsLeft = 0, savedSeconds = 0; 

    const exercisesDataset = [
        { id: "user1_run", name: "Run for 10 Minutes", payout: 120, allowedUsers: [REAL_NAME_1] },
        { id: "user1_jacks", name: "60 Jumping Jacks", payout: 60, allowedUsers: [REAL_NAME_1] },
        { id: "user2_pushups", name: "12 Pushups", payout: 60, allowedUsers: [REAL_NAME_2] },
        { id: "user2_pullups", name: "1 Pull-up", payout: 10, allowedUsers: [REAL_NAME_2] }
    ];
    const shopDataset = [
        { id: "pc_10", name: "10 Mins Tech Time", cost: 10, minutes: 10 },
        { id: "pc_60", name: "1 Hour Tech Time", cost: 60, minutes: 60 },
        { id: "pc_120", name: "2 Hours Tech Time", cost: 120, minutes: 120 }
    ];

    window.onload = function() {
        const uDrop = document.getElementById('userDropdown'); uDrop.innerHTML = '';
        userList.forEach(n => {
            const o = document.createElement('option'); o.value = n; o.textContent = n; uDrop.appendChild(o);
            userBalances[n] = 0;
        });
        uDrop.addEventListener('change', refreshContext);
        document.getElementById('claimBtn').addEventListener('click', claimPoints);
        document.getElementById('startBtn').addEventListener('click', startTimer);
        document.getElementById('pauseBtn').addEventListener('click', pauseTimer);
        document.getElementById('stopBtn').addEventListener('click', stopTimer);
        refreshContext();
    };

    function refreshContext() {
        const name = document.getElementById('userDropdown').value; if (!name) return;
        document.getElementById('displayName').textContent = name;
        document.getElementById('pointsBalance').textContent = userBalances[name];
        const exSelect = document.getElementById('exerciseSelect'); exSelect.innerHTML = '';
        exercisesDataset.forEach(i => {
            if (i.allowedUsers.includes(name)) {
                const o = document.createElement('option'); o.value = i.id; o.textContent = `${i.name} (+${i.payout} pts)`; exSelect.appendChild(o);
            }
        });
        const sContainer = document.getElementById('shopContainer'); sContainer.innerHTML = '';
        shopDataset.forEach(i => {
            const row = document.createElement('div'); row.className = 'shop-item';
            row.innerHTML = `<span>${i.name} <strong>(${i.cost} pts)</strong></span>`;
            const btn = document.createElement('button'); btn.className = 'buy-btn'; btn.textContent = 'Buy';
            btn.onclick = function() { buyItem(i.id, name); };
            row.appendChild(btn); sContainer.appendChild(row);
        });
    }

    function claimPoints() {
        const name = document.getElementById('userDropdown').value;
        const ex = exercisesDataset.find(e => e.id === document.getElementById('exerciseSelect').value);
        if (ex) {
            userBalances[name] += ex.payout; document.getElementById('pointsBalance').textContent = userBalances[name];
            alert(`Claimed ${ex.payout} points for ${name}!`);
        }
    }

    function buyItem(id, name) {
        const item = shopDataset.find(i => i.id === id); if (!item) return;
        if (userBalances[name] < item.cost) { alert("Need more points!"); return; }
        userBalances[name] -= item.cost; document.getElementById('pointsBalance').textContent = userBalances[name];
        secondsLeft += item.minutes * 60; savedSeconds = secondsLeft; updateClock();
        document.getElementById('startBtn').disabled = false; document.getElementById('stopBtn').disabled = false;
        alert(`Successfully bought: ${item.name}! Added to your active timer.`); 
    }

    function startTimer() {
        document.getElementById('startBtn').disabled = true; document.getElementById('pauseBtn').disabled = false;
        countdownInterval = setInterval(() => {
            if (secondsLeft <= 0) {
                clearInterval(countdownInterval); document.getElementById('timer').textContent = "00:00:00";
                document.getElementById('pauseBtn').disabled = true; document.getElementById('alarmAudio').play().catch(e=>{});
                alert("Time's up!"); return;
            }
            secondsLeft--; updateClock();
        }, 1000);
    }
    function pauseTimer() { clearInterval(countdownInterval); document.getElementById('startBtn').disabled = false; document.getElementById('pauseBtn').disabled = true; clearAudio(); }
    function stopTimer() { clearInterval(countdownInterval); secondsLeft = savedSeconds; updateClock(); document.getElementById('startBtn').disabled = false; document.getElementById('pauseBtn').disabled = true; clearAudio(); }
    function clearAudio() { const a = document.getElementById('alarmAudio'); a.pause(); a.currentTime = 0; }
    
    function updateClock() {
        const h = Math.floor(secondsLeft / 3600);
        const m = Math.floor((secondsLeft % 3600) / 60);
        const s = secondsLeft % 60;
        document.getElementById('timer').textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }
</script></body></html>
