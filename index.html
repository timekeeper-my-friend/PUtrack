<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Exercise & Time Shop Tracker</title> 
    <!-- Secure Multi-Protocol Email SDK Proxy -->
    <script type="text/javascript" src="https://unpkg.com"></script>
    <style> 
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #f3f4f6; padding: 20px; } 
        .tracker { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; max-width: 450px; width: 100%; } 
        .section { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 2px solid #f1f5f9; }
        .section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        h3 { margin-top: 0; color: #1e293b; font-size: 18px; }
        select, button { padding: 10px 16px; font-size: 16px; margin: 4px; border-radius: 6px; } 
        select { border: 1px solid #cbd5e1; background: white; text-align: center; min-width: 150px; }
        button { background-color: #2563eb; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:disabled { background-color: #cbd5e1; cursor: not-allowed; }
        #balance-display { font-size: 22px; font-weight: bold; color: #16a34a; margin-bottom: 10px; }
        #timer { font-size: 54px; font-weight: bold; margin: 15px 0; font-family: monospace; } 
        .shop-list { display: flex; flex-direction: column; gap: 8px; text-align: left; margin-top: 10px; }
        .shop-item { display: flex; justify-content: space-between; align-items: center; background: #f8fafc; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 6px; }
        .shop-item span { font-weight: 500; font-size: 14px; }
        .buy-btn { background-color: #16a34a; font-size: 14px; padding: 6px 12px; margin: 0; }
    </style> 
</head> 
<body> 
<audio id="alarmAudio" src="https://google.com" preload="auto"></audio>
<div class="tracker"> 
    <div class="section">
        <h3>Select Profile</h3>
        <select id="userDropdown"></select>
    </div>
    <div class="section">
        <div id="balance-display"><span id="displayName">Loading</span>'s Balance: <span id="pointsBalance">0</span> Points</div>
    </div>
    <div class="section">
        <h3>1. Track Exercises</h3>
        <select id="exerciseSelect"></select>
        <button id="claimBtn">Claim Points</button>
    </div>
    <div class="section">
        <h3>2. Time Reward Shop</h3>
        <div class="shop-list" id="shopContainer"></div>
    </div>
    <div class="section">
        <h3>3. Active Time Remaining</h3>
        <div id="timer">00:00:00</div> 
        <div> 
            <button id="startBtn" disabled>Start Time</button> 
            <button id="pauseBtn" disabled>Pause</button> 
            <button id="stopBtn" disabled>Stop</button> 
        </div> 
    </div>
</div>
